apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: cefetinder
  labels:
    app: notification-service
    app.kubernetes.io/name: cefetinder
    app.kubernetes.io/component: notification-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        app.kubernetes.io/name: cefetinder
        app.kubernetes.io/component: notification-service
    spec:
      containers:
        - name: notification-service
          image: cefetinder/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: websocket
              containerPort: 8080
              protocol: TCP
          env:
            - name: WEBSOCKET_PORT
              value: "8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: websocket
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: websocket
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
