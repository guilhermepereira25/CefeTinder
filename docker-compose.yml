services:
  queue-notification:
    image: rabbitmq:3-management
    container_name: cefet-tinder-rabbitmq
    restart: always
    networks:
      - cefet-tinder-network
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"

  kong:
    image: kong:latest
    container_name: cefet-tinder-kong
    restart: always
    networks:
      - cefet-tinder-network
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    environment:
      KONG_DATABASE: "off"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
    volumes:
      - ./infra/kong/kong.yml:/usr/local/kong/declarative/kong.yml
    depends_on:
      - graphql-service

  graphql-service:
    build:
      context: .
    container_name: cefet-tinder-graphql-server
    restart: always
    networks:
      - cefet-tinder-network
    expose:
      - "4000"
    environment:
      USER_SERVICE_ADDRESS: "user-service:50051"
      MATCH_SERVICE_ADDRESS: "match-service:50052"
    depends_on:
      - user-service
      - match-service
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    command: sh -c "npm run start:graphql"

  user-service:
    build:
      context: .
    container_name: cefet-tinder-user-service
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://user:secret@db-users:5432/users"
      USER_SERVICE_ADDRESS: "0.0.0.0:50051"
    restart: always
    expose:
      - "50051"
    networks:
      - cefet-tinder-network
    depends_on:
      - db-users
    command: sh -c "npm run start:grpc:user-service"

  match-service:
    build:
      context: .
    container_name: cefet-tinder-match-service
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://user:secret@db-match:5432/match"
      MATCH_SERVICE_ADDRESS: "0.0.0.0:50052"
      RABBITMQ_URL: "amqp://guest:guest@queue-notification:5672"
    restart: always
    expose:
      - "50052"
    networks:
      - cefet-tinder-network
    depends_on:
      - db-match
      - notification-service
      - queue-notification
    command: sh -c "npm run start:grpc:match-service"

  notification-service:
    build:
      context: .
    container_name: cefet-tinder-notification-service
    restart: always
    ports:
      - "8080:8080"
    networks:
      - cefet-tinder-network
    environment:
      RABBITMQ_URL: "amqp://guest:guest@queue-notification:5672"
    depends_on:
      - queue-notification
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    command: sh -c "npm run start:socket"

  db-users:
    image: postgres:16
    container_name: cefet-tinder-db-users
    restart: always
    networks:
      - cefet-tinder-network
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: users
    ports:
      - "5433:5432"
    volumes:
      - db-users-data:/var/lib/postgresql/data
      - ./migration_postgresql.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  db-match:
    image: postgres:16
    container_name: cefet-tinder-db-match
    restart: always
    networks:
      - cefet-tinder-network
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: match
    ports:
      - "5434:5432"
    volumes:
      - db-match-data:/var/lib/postgresql/data
      - ./migration_match.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  floci:
    image: floci/floci:latest
    networks:
      - cefet-tinder-network
    ports:
      - "4566:4566"
      - "7001-7099:7001-7099"
    volumes:
      # Local directory bind mount (default)
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      FLOCI_SERVICES_DOCKER_NETWORK: cefetinder_cefet-tinder-network
      FLOCI_SERVICES_RDS_PROXY_BASE_PORT: "7001"

networks:
  cefet-tinder-network:
    driver: bridge

volumes:
  db-users-data:
  db-match-data:
